<!--Este é um comentario em html-->

<!-- HTML é uma linguagem de marcação ou seja , ela nao possui logica.
 O que que ela faz? 

 Cada elemento possui uma etiqueta que chamamos de 'tag'.
 
 Quando queremos criar algo, chamamos a 'teg' que representa 
 aquele elemento. ou seja, HTML serve apenas para dizer o que existe em uma pagina
 
 As tags precisam ser fechadas . <html> </html>
 As tags tambem possuem atributos . <html lang="en"> </html> -->


<!DOCTYPE html>
<html lang="pt-BR"> <!--Html é a tag que deve envolver todo documento-->

<head> <!--Contem varias informações a respeito da pagina-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title> <!--Titulo da pagina-->
</head>

    <body><!--Dentro desta tag é que vamos criar nossos elementos que vão aparecer para o usuario. Body significa 'corpo .'-->
          <!--h1 é a tag de titulo principal--> 
       <h1>Sobre html</h1>
       <h2>O que é o html</h2>
       <h3>A respeito da linguagem de marcação </h3>
       <!--<p></p> é a teg para escrever um paragrafo-->
       <!--<br> é a teg para quebrar linha. Br vem de 'BREAK ROW', Que significa 'Quebrar linha'-->
       <p>texto muitoo foda que eu to com preguiça <br> de pesquisar e colar aqui</p>
       <!-- <hr> cria uma linha horizontal -->
        <hr>
        <!--<a></a> é a teg para linhas. 'a' vem 'ancora'
        Ela sempre é acompanhada do atributo href="", que indica para qual link ela vai direcionar o usuario-->

       <!--tributo targe='_blank-->
            <a href="https://www.reddit.com/r/ape/comments/17uzjrs/big_monke_flips_you_off_what_u_do/?tl=pt-pt"targe="_blank">Clique aqui</a>

            <!--<img> é a tag de imagem 
            Ela sempre vem com os atributos src="", que indica a origem da imagem (onde ela esta ) e o atributo alt="", que deve conter um texto explicativo sobre a imagem
            ]ele é usado caso a imagem nao carregue ou por softwares de acessibilidade-->



            <!--Imagem via link-->
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS9W-jxuO2skCW1Ku5HC8N2zL2ec6T1eNEKJFUk6FuhlA&s" alt="Suriço">

            <!--Imagem baixada-->
            <img src="assets/images/aura.jpg" alt="aura">

            <!--<button></button> é a teg que cria um botao-->
            <button>Clique aqui</button>

              <ol><!--Ordered list / Lista ordenada (ou seja cria uma lista que tem numeros )-->
                <li>Item 1</li>
              </ol>
            <ul><!--Unordered List / Lista desordenada (ou seja cria uma lista sem numerção)-->
                <li>Item 1</li>
            </ul>
    </body>

</html>
